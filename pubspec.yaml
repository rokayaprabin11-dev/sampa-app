name: sampada
description: A new Flutter project for Heritage Sites in Nepal.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  firebase_messaging: ^16.3.0
  firebase_performance: ^0.11.4+2
  sqflite: ^2.3.2
  path: ^1.9.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_db_store: ^6.0.0
  path_provider: ^2.1.5
  get_it: ^9.2.1
  flutter_secure_storage: ^10.3.1
  dartz: ^0.10.1
  geolocator: ^14.0.2
  freezed_annotation: ^3.1.0
  nepali_utils: ^3.0.8
  flutter_local_notifications: ^22.0.0
  crypto: ^3.0.3
  permission_handler: ^12.0.3
  google_sign_in: ^7.2.0
  equatable: ^2.0.5
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^8.2.2
  intl: ^0.20.2
  shimmer: ^3.0.0
  geofencing_api: ^2.0.0
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2

dependency_overrides:
  win32: 5.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^3.2.5

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/images/onboarding/
    - assets/images/districts/
