name: sampada
description: A new Flutter project for Heritage Sites in Nepal.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  firebase_messaging: ^16.3.0
  firebase_performance: ^0.11.4+2
  cloud_firestore: ^6.1.0
  sqflite: ^2.3.2
  path: ^1.9.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_db_store: ^6.0.0
  path_provider: ^2.1.5
  get_it: ^9.2.1
  flutter_secure_storage: ^10.3.1
  dartz: ^0.10.1
  geolocator: ^14.0.2
  freezed_annotation: ^3.1.0
  nepali_utils: ^3.0.8
  flutter_local_notifications: ^22.0.0
  crypto: ^3.0.3
  permission_handler: ^12.0.3
  google_sign_in: ^7.2.0
  equatable: ^2.0.5
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^8.2.2
  intl: ^0.20.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  geofencing_api: ^2.0.0
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  google_fonts: ^8.1.0
  device_info_plus: ^13.2.0
  package_info_plus: ^10.2.0
  url_launcher: ^6.3.2
  share_plus: ^13.2.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^3.2.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.3

# Native launch splash. Run `dart run flutter_native_splash:create` after
# changing these. Flat temple-red everywhere (Android 12's system splash only
# supports a solid colour, so the Flutter splash matches it flat — no gradient),
# emblem centred. Density buckets are generated correctly, unlike a hand-rolled
# launch drawable. The Flutter splash draws the same emblem at the same size on
# the same colour, so the native→Flutter handoff shows no jump.
flutter_native_splash:
  color: "#5C1A0A"
  image: assets/images/Sampada-logo.png
  android_12:
    color: "#5C1A0A"
    image: assets/icons/splash_android12.png
  android_gravity: center
  fullscreen: false

# Launcher icon generation. Run `dart run flutter_launcher_icons` after changing
# the source art. Legacy icon = the full circular emblem; the Android 8+ adaptive
# icon is the padded emblem on the temple-red brand background, so it survives
# every launcher mask (circle, squircle, rounded square) without cropping.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/Sampada-logo.png"
  adaptive_icon_background: "#5C1A0A"
  # Full emblem — flutter_launcher_icons applies its own 16% safe-zone inset, so
  # the foreground must NOT be pre-padded or the emblem ends up tiny.
  adaptive_icon_foreground: "assets/images/Sampada-logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/images/onboarding/
    - assets/images/districts/
